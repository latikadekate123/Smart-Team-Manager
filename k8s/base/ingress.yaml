apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: smart-planner
  namespace: smart-planner
spec:
  ingressClassName: nginx
  rules:
    - host: smart-planner.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend
                port:
                  number: 80
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: backend
                port:
                  number: 8080
          - path: /ws
            pathType: Prefix
            backend:
              service:
                name: backend
                port:
                  number: 8080
